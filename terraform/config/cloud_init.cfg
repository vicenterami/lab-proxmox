hostname: ${hostname}
fqdn: ${fqdn}
manage_etc_hosts: false
users:
  - name: root
    lock_passwd: false
    passwd: "$6$kxy2pKOxS.H4PhLc$/g0CvYb0R9OYq/eXgeIb4DB91Dju3/XMS/cHa5kYbrWKV4jZxVrhxD2YO/Wi3eqU.WN0ZydHs3KdeXTzYWBO1."
    home: /root

chpasswd:
  expire: False

growpart:
  mode: auto
  devices: ['/']
  ignore_growroot_disabled: false

write_files:
  - path: /etc/hosts
    content: |
      127.0.0.1 localhost

      ::1     ip6-localhost ip6-loopback
      ff02::1 ip6-allnodes
      ff02::2 ip6-allrouters

      ${ip1} ${hostname}.midominio.org ${hostname}

  - path: /etc/network/interfaces
    content: |
      auto lo
      iface lo inet loopback

      auto enp1s0
      iface enp1s0 inet manual

      auto vmbr0
      iface vmbr0 inet static
          address ${ip1}/24
          gateway ${gateway}
          bridge_ports enp1s0
          bridge_stp off
          bridge_fd 0

      auto enp1s1
      iface enp1s1 inet manual

      auto vmbr1
      iface vmbr1 inet static
          address ${ip2}/24
          bridge_ports enp1s1
          bridge_stp off
          bridge_fd 0

runcmd:
  - resize2fs /dev/vda3
  - ifdown vmbr0 || true
  - ifup vmbr0
  - ifup enp1s1 
  - ifup vmbr1
